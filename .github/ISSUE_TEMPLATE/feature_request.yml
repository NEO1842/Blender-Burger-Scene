name: Feature Request / 改善提案
description: Suggest an idea or improvement / アイデアや改善点を提案する
title: "[FEATURE] "
labels: ["enhancement"]
assignees:
  - NEO1842

body:
  - type: markdown
    attributes:
      value: |
        Thanks for your suggestion! 🍔  
        ご提案ありがとうございます！

  - type: textarea
    id: summary
    attributes:
      label: Summary / 概要
      description: What would you like to see added or improved? / 追加・改善してほしい内容を説明してください。
      placeholder: "e.g. Add fries as a side prop... / ポテトをサイドプロップとして追加してほしい..."
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why / 理由
      description: Why would this be useful? / なぜこれが有用だと思いますか？
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context / 補足
      description: Any other context, screenshots, or references. / その他の補足情報やスクリーンショットなど。
